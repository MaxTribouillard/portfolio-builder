<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
      tailwind.config = {
          theme: {
              extend: {
                  fontFamily: {
                      sans: ['Inter', 'sans-serif'],
                  },
              }
          }
      }
  </script>
</head>
<body class="bg-slate-950 text-white font-sans antialiased flex flex-col min-h-screen selection:bg-indigo-900/50 selection:text-indigo-100">
<header class="sticky top-0 z-50 w-full backdrop-blur-md bg-slate-950/70 border-b border-slate-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Brand -->
      <a href="/" class="flex-shrink-0 flex items-center gap-2 group">
        <svg class="h-8 w-8 text-indigo-400 group-hover:text-indigo-300 transition-colors" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="currentColor"/>
          <path d="M10 12h12M10 16h12M10 20h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="flex flex-col">
          <span class="font-bold text-lg tracking-tight text-white leading-none">Portfolio Builder</span>
          <span class="text-[10px] text-slate-400 font-medium uppercase tracking-wider mt-0.5">Gérez vos contenus</span>
        </div>
      </a>

      <!-- Actions -->
      <nav class="flex items-center gap-4">
        {{#activeUser}}
        <a href="/admin" class="text-sm font-medium text-slate-400 hover:text-white transition-all duration-200 px-3 py-2">Utilisateurs</a>
        <a href="/admin/profiles" class="text-sm font-medium text-slate-400 hover:text-white transition-all duration-200 px-3 py-2">Profils</a>
        <a href="/user/dashboard" class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-slate-300 bg-slate-800 border border-slate-700 rounded-xl shadow-sm hover:bg-slate-700 hover:text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
            </svg>
            Dashboard
        </a>
        {{/activeUser}}
        {{^activeUser}}
        <a href="/login" class="text-sm font-medium text-slate-400 hover:text-white transition-all duration-200 px-3 py-2">Connexion</a>
        <a href="/register" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white bg-indigo-500 border border-transparent rounded-xl shadow-sm hover:bg-indigo-600 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">S'inscrire</a>
        {{/activeUser}}
      </nav>
    </div>
  </div>
</header>
<main class="flex-grow">
