{{> partials/header}}

<main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16 flex-grow w-full">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-sm overflow-hidden flex flex-col">
        <div class="px-6 py-8 border-b border-slate-800 bg-slate-950 flex items-center gap-4">
            <div class="w-16 h-16 rounded-full bg-indigo-900/50 text-indigo-400 flex items-center justify-center font-bold text-2xl uppercase shadow-inner">
                {{activeUser.username}}
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Mon Profil</h1>
                <p class="text-sm text-slate-400 mt-1">Gérez vos informations personnelles et paramètres.</p>
            </div>
    </div>

        <div class="p-6 sm:p-8 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 border-b border-slate-800 pb-6">
                <dt class="text-sm font-medium text-slate-400">Nom d'utilisateur</dt>
                <dd class="text-sm text-white font-semibold sm:col-span-2">{{activeUser.username}}</dd>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 border-b border-slate-800 pb-6">
                <dt class="text-sm font-medium text-slate-400">Prénom</dt>
                <dd class="text-sm text-white font-semibold sm:col-span-2">{{activeUser.firstname}}</dd>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 border-b border-slate-800 pb-6">
                <dt class="text-sm font-medium text-slate-400">Adresse mail</dt>
                <dd class="text-sm text-white font-semibold sm:col-span-2">{{activeUser.email}}</dd>
            </div>
            <!-- More fields can go here -->
        </div>

        <div class="px-6 py-4 bg-slate-950 border-t border-slate-800 flex justify-end gap-3">
            <a href="/user/dashboard" class="px-4 py-2 text-sm font-medium text-slate-300 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500">Retour au dashboard</a>
        </div>
    </div>
</main>

{{> partials/footer}}
