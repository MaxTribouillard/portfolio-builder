<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Portfolio Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-white font-sans antialiased min-h-screen flex flex-col items-center justify-center selection:bg-indigo-900/50 selection:text-indigo-100 relative overflow-hidden">

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-indigo-900/50/40 blur-[100px]"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-blue-100/40 blur-[100px]"></div>
    </div>

    <!-- Navigation Overlay -->
    <div class="absolute top-0 left-0 w-full p-6 z-20 flex justify-between items-center">
        <a href="/" class="flex items-center gap-2 group">
            <svg class="h-8 w-8 text-indigo-400 group-hover:text-indigo-300 transition-colors" viewBox="0 0 32 32" fill="none">
                <rect width="32" height="32" rx="8" fill="currentColor"/>
                <path d="M10 12h12M10 16h12M10 20h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="font-bold text-xl tracking-tight text-white leading-none">Portfolio Builder</span>
        </a>
        <a href="/" class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-slate-300 bg-slate-950/80 backdrop-blur-sm border border-slate-800 rounded-xl shadow-sm hover:bg-slate-700 hover:text-white transition-all duration-200">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Accueil
        </a>
    </div>

    <!-- Login Card -->
    <main class="w-full max-w-md px-4 py-16 z-10 relative">
        <div class="bg-slate-950 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-800 overflow-hidden">
            <div class="p-8 sm:p-10">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-900/30 text-indigo-400 mb-6">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight">Bienvenue !</h1>
                    <p class="mt-3 text-slate-400">Connectez-vous pour accéder à votre dashboard</p>
                </div>

                <form method="post" action="/login" class="space-y-6">
                    <div class="space-y-5">
                        <!-- Email Input -->
                        <div>
                            <label for="username" class="block text-sm font-medium text-white mb-2 flex items-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                Identifiant
                            </label>
                            <input id="username" type="text" name="username" placeholder="Votre email ou nom d'utilisateur" required autofocus
                                class="block w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-3 text-white placeholder-slate-500 focus:bg-slate-800 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all duration-200 sm:text-sm shadow-sm">
                        </div>

                        <!-- Password Input -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-white mb-2 flex items-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                Mot de passe
                            </label>
                            <input id="password" type="password" name="password" placeholder="Votre mot de passe" required
                                class="block w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-3 text-white placeholder-slate-500 focus:bg-slate-800 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all duration-200 sm:text-sm shadow-sm">
                        </div>
                    </div>

                    <div class="flex items-center justify-between mt-6">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox"
                                class="h-4 w-4 rounded border-slate-300 text-indigo-400 focus:ring-indigo-600">
                            <label for="remember-me" class="ml-2 block text-sm text-slate-400">
                                Se souvenir de moi
                            </label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-indigo-400 hover:text-indigo-500 transition-colors">
                                Mot de passe oublié ?
                            </a>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                            class="group relative flex w-full justify-center items-center gap-2 rounded-xl bg-indigo-500 px-4 py-3.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all duration-200">
                            Se connecter
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform">
                                <path d="M5 12h14"></path>
                                <path d="m12 5 7 7-7 7"></path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>

            <div class="px-8 py-6 bg-slate-950 border-t border-slate-800 text-center">
                <p class="text-sm text-slate-400">
                    Pas encore de compte ?
                    <a href="/register" class="font-semibold text-indigo-400 hover:text-indigo-500 transition-colors ml-1">Créer un compte</a>
                </p>
            </div>
        </div>
    </main>
</body>
</html>
