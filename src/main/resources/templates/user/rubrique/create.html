{{> partials/header}}

<main class="flex-grow pt-16 pb-12 flex items-center justify-center px-4 w-full h-full min-h-[80vh]">
    <section class="bg-slate-800 border border-slate-700 p-8 rounded-2xl shadow-lg w-full max-w-lg transition-all duration-200">
        <div class="mb-8 flex items-center justify-between">
            <h2 class="text-2xl font-semibold text-white">Nouvelle Rubrique</h2>
            <a href="/user/profile/info/{{id}}" class="text-slate-400 hover:text-white transition-colors border border-slate-700 p-2.5 rounded-xl hover:bg-slate-700" title="Retour au profil">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
        </div>

        <form method="post" action="/user/profile/rubrique/create/{{id}}" class="flex flex-col gap-6">
            <input style="display: none;" name="profile" value="{{id}}"/>

            <div class="flex flex-col gap-2.5">
                <label for="name" class="text-sm font-medium text-slate-300">Titre de la rubrique</label>
                <input id="name" name="name" placeholder="Exemples : Développeur Freelance, Licence Informatique..." type="text"
                       class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200 text-slate-100 placeholder:text-slate-500" required/>
            </div>

            <div class="flex flex-col gap-2.5">
                <label for="description" class="text-sm font-medium text-slate-300">Description détaillée</label>
                <textarea id="description" name="description" placeholder="Décrivez vos missions, vos compétences acquises ou vos résultats..." rows="4"
                       class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200 text-slate-100 placeholder:text-slate-500" required></textarea>
            </div>

            <div class="flex flex-col gap-2.5">
                <label for="categorie" class="text-sm font-medium text-slate-300">Catégorie</label>
                <div class="relative">
                    <select id="categorie" name="categorie.id"
                            class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200 text-slate-100 appearance-none" required>
                        <option value="" disabled selected>Sélectionnez une catégorie...</option>
                        {{#categories}}
                            <option value="{{id}}">{{name}}</option>
                        {{/categories}}
                    </select>
                    <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button name="submit" type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl px-4 py-3.5 flex items-center justify-center gap-2 transition-all duration-200 shadow-sm shadow-indigo-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
                    Ajouter la rubrique
                </button>
            </div>
        </form>
    </section>
</main>

{{> partials/footer}}
